---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app mosquitto
  namespace: mosquitto
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      mosquitto:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-passwd:
            image:
              repository: eclipse-mosquitto
              tag: 2.0.21
            command:
              - /bin/sh
              - -c
              - |
                mosquitto_passwd -b -c /mosquitto/passwd/passwd "$MQTT_USERNAME" "$MQTT_PASSWORD"
                mosquitto_passwd -b /mosquitto/passwd/passwd "$MQTT_HA_USERNAME" "$MQTT_HA_PASSWORD"
            env:
              MQTT_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: mosquitto-secret
                    key: username
              MQTT_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: mosquitto-secret
                    key: password
              MQTT_HA_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: mosquitto-secret
                    key: ha_username
              MQTT_HA_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: mosquitto-secret
                    key: ha_password
        containers:
          app:
            image:
              repository: eclipse-mosquitto
              tag: 2.0.21
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: "192.168.86.67"
        labels:
          lb_pool: reserved
        controller: *app
        ports:
          mqtt:
            port: 1883
            protocol: TCP
    persistence:
      config:
        type: configMap
        name: mosquitto-config
        globalMounts:
          - path: /mosquitto/config/mosquitto.conf
            subPath: mosquitto.conf
      data:
        existingClaim: mosquitto-data
        globalMounts:
          - path: /mosquitto/data
      passwd:
        type: emptyDir
        globalMounts:
          - path: /mosquitto/passwd
